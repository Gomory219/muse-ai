<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 绿色渐变 -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d26a;stop-opacity:1" />
    </linearGradient>

    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="url(#bgGrad)"/>

  <!-- 主体 <M_> -->
  <g transform="translate(58, 80)">
    <!-- 左尖括号 -->
    <text x="-52" y="0" font-family="monospace" font-size="56" fill="#444444" font-weight="bold">&lt;</text>

    <!-- M 字母 -->
    <text x="-16" y="0" font-family="monospace" font-size="48" fill="url(#greenGrad)" font-weight="400" filter="url(#glow)">M</text>

    <!-- 光标 - 无动画，常亮 -->
    <rect x="18" y="-4" width="20" height="6" fill="#00d26a" opacity="1"/>

    <!-- 右尖括号 -->
    <text x="38" y="0" font-family="monospace" font-size="56" fill="#444444" font-weight="bold">&gt;</text>
  </g>
</svg>
